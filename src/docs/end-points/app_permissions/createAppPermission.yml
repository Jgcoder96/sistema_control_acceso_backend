/api/app/permissions:
  post:
    summary: Crear Permiso
    description: |
      # 🔑 Crear un nuevo permiso
    tags:
      - Permisos de App
    requestBody:
      description: Datos necesarios para crear un permiso.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - slug
              - descripcion
            properties:
              slug:
                type: string
                maxLength: 100
                description: Identificador único del permiso en formato slug (sin espacios).
                example: 'usuarios.crear'
              descripcion:
                type: string
                maxLength: 100
                description: Explicación detallada de lo que permite hacer este permiso.
                example: 'Permite crear nuevos usuarios.'
    responses:
      '201':
        description: Recurso creado exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Permiso creado con éxito.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              campos_incorrectos:
                summary: 1.  Campos Incorrectos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'slug'
                      message: "El campo 'slug' es obligatorio y debe ser una cadena de texto."
                    - field: 'descripcion'
                      message: "El campo 'descripcion' es obligatorio y debe ser una cadena de texto."
              longitud_incorrecta:
                summary: 2. Longitud Incorrecta
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'slug'
                      message: "El campo 'slug' debe contener al menos 4 caracteres."
                    - field: 'slug'
                      message: "El campo 'slug' no puede exceder los 100 caracteres."
                    - field: 'descripcion'
                      message: "El campo 'descripcion' debe contener al menos 4 caracteres."
                    - field: 'descripcion'
                      message: "El campo 'descripcion' no puede exceder los 100 caracteres."
              slug_invalido:
                summary: 3. Campo 'slug' inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'slug'
                      message: 'El slug solo puede contener letras minúsculas, números, puntos, guiones y guiones bajos (sin espacios).'
              estructura_invalida:
                summary: 4. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
      '409':
        description: El recurso ya existe en la base de datos.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Ya se encuentra registrado un permiso activo con este slug.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
