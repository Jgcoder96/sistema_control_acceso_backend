/api/users/login:
  post:
    summary: Iniciar sesión
    description: |
      # 👤🔑 Iniciar sesión
    tags:
      - Iniciar Sesión
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - correo_electronico
              - clave
            properties:
              correo_electronico:
                type: string
                format: email
                description: Correo electrónico del usuario
                example: example@example.com
              clave:
                type: string
                format: password
                description: Contraseña de acceso
                example: Test.1234
    responses:
      '200':
        description: Login exitoso
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Sesión iniciada exitosamente.
                data:
                  type: object
                  properties:
                    user:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          example: bffbed5b-53e9-4c5f-ae16-c9e3848b095b
                        nombre:
                          type: string
                          example: nombre
                        apellido:
                          type: string
                          example: apellido
                        cedula:
                          type: string
                          example: cedula
                        correo_electronico:
                          type: string
                          format: email
                          example: example@example.com
                        foto_url:
                          type: string
                          format: uri
                          example: 'https://teg-s3-bucket.s3.us-east-2.amazonaws.com/fotos/1780935396649?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20260622T010138Z&X-Amz-Expires=3600&X-Amz-Signature=37ffbd66e81d37f5f3b400d4ac01ae6bbe56307bd771482e693b2c40ec6a7d72'
                        roles:
                          type: array
                          items:
                            type: string
                          example: []
                        permisos:
                          type: array
                          items:
                            type: string
                          example: []
                    tokens:
                      type: object
                      properties:
                        access:
                          type: string
                          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImJmZmJlZDViLTUzZTktNGM1Zi1hZTE2LWM5ZTM4NDhiMDk1YiIsIm5vbWJyZSI6Ikpvc8OpIiwiYXBlbGxpZG8iOiJQw6lyZXoiLCJjZWR1bGEiOiIyNTU0MjU4NiIsImNvcnJlbyI6Impvc2VwZXJlekBleGFtcGxlLmNvbSIsInJvbGVzIjpbXSwicGVybWlzb3MiOltdLCJpYXQiOjE3ODIwOTAwOTgsImV4cCI6MTc4MjA5MzY5OH0.ocVLTa3RocLALgqT-FCTupmLObHFe5R77zD4O3uQHtA
                        refresh:
                          type: string
                          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImJmZmJlZDViLTUzZTktNGM1Zi1hZTE2LWM5ZTM4NDhiMDk1YiIsImlhdCI6MTc4MjA5MDA5OCwiZXhwIjoxNzgyNjk0ODk4fQ.2wQI3adTO0d1_qQB805LJ3_5gGR-Ci5wAmSTRC3xnd8
      '400':
        description: Error de validación en los datos enviados
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              estructura_invalida:
                summary: 1. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
              campos_invalidos:
                summary: 2. Campos Inválidos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados'
                  issues:
                    - field: 'correo_electronico'
                      message: "El campo 'correo_electronico' es obligatorio y debe ser una cadena de texto."
                    - field: 'clave'
                      message: "El campo 'clave' es obligatorio y debe ser una cadena de texto."
              longitud_incorrecta:
                summary: 3. Longitud Incorrecta
                value:
                  success: false
                  message: 'Error de validación en los datos enviados'
                  issues:
                    - field: 'clave'
                      message: 'La contraseña debe tener al menos 8 caracteres.'
                    - field: 'clave'
                      message: 'La contraseña no puede exceder los 100 caracteres.'
              complejidad_clave:
                summary: 4. Reglas de seguridad de contraseña
                value:
                  success: false
                  message: 'Error de validación en los datos enviados'
                  issues:
                    - field: 'clave'
                      message: 'La contraseña debe incluir al menos una letra mayúscula.'
                    - field: 'clave'
                      message: 'La contraseña debe incluir al menos una letra minúscula.'
                    - field: 'clave'
                      message: 'La contraseña debe incluir al menos un número.'
                    - field: 'clave'
                      message: 'La contraseña debe incluir al menos un carácter especial.'
      '401':
        description: Credenciales incorrectas
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: La contraseña proporcionada es incorrecta.
      '404':
        description: Registro no encontrado
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: No se encontró ningún usuario con el correo electrónico proporcionado.
      '500':
        description: Error interno del servidor
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor
