/api/firmware/cards/:
  get:
    summary: Obtener Tarjetas
    description: |
      # 📋 Obtener la lista de Tarjetas de Acceso
    tags:
      - Tarjetas de Acceso
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: status
        schema:
          type: string
          enum: [activable, activa, bloqueada, perdida, eliminada, all]
          default: all
        description: Filtra las ubicaciones por su estado.
      - in: query
        name: codigo
        schema:
          type: string
        description: Filtra por coincidencia parcial por código de tarjeta.
        example: '0010725571'
      - in: query
        name: cedula
        schema:
          type: string
        description: Filtra por coincidencia parcial por cedula de usuario.
        example: '12345678'
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Número de página para la paginación.
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Cantidad de registros por página.
    responses:
      '200':
        description: Tarjetas de Acceso obtenidas exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Tarjetas de Acceso obtenidas exitosamente.
                data:
                  type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: 'd088ff6f-cd51-4a75-9854-696368a05752'
                          codigo:
                            type: string
                            example: '0003924556'
                          estado:
                            type: string
                            enum: [activa, eliminada, bloqueada]
                            example: 'activa'
                          creado_el:
                            type: string
                            format: date-time
                          actualizado_el:
                            type: string
                            format: date-time
                          eliminado_el:
                            type: string
                            format: date-time
                            nullable: true
                          asignada_el:
                            type: string
                            format: date-time
                            nullable: true
                          usuario:
                            type: object
                            nullable: true
                            properties:
                              id:
                                type: string
                                format: uuid
                              nombre:
                                type: string
                              apellido:
                                type: string
                              cedula:
                                type: string
                            example:
                              id: 'ed162926-07c0-44de-aed7-5d302c85e72a'
                              nombre: 'José'
                              apellido: 'Pérez'
                              cedula: '25542586'
                          historial_asignaciones:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                accion:
                                  type: string
                                  example: 'asignacion'
                                fecha:
                                  type: string
                                  format: date-time
                                usuario:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                      format: uuid
                                    nombre:
                                      type: string
                                    apellido:
                                      type: string
                                    cedula:
                                      type: string
                    metadata:
                      type: object
                      properties:
                        totalItems:
                          type: integer
                          example: 3
                        page:
                          type: integer
                          example: 1
                        limit:
                          type: integer
                          example: 10
                        totalPages:
                          type: integer
                          example: 1
      '400':
        description: Error de validación en los parámetros de consulta (Query Params).
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message:
                  {
                    type: string,
                    example: 'Error de validación en los datos enviados.',
                  }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              invalid_status:
                summary: 1. Error en el estado
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'status'
                      message: "El estado de la consulta debe ser 'activable', 'activa', 'bloqueada', 'perdida', 'eliminada' o 'all'."
              the_page_is_not_a_number:
                summary: 2. La página no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número.'
              the_page_is_not_an_integer:
                summary: 3. La página no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número entero.'
              minimum_page:
                summary: 4. El numero de página es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página mínima de la consulta es 1.'
              limit_is_not_a_number:
                summary: 5. El límite no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número.'
              limit_is_not_an_integer:
                summary: 6. El límite no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número entero.'
              minimum_limit:
                summary: 7. El límite es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite mínimo de la consulta es 1.'
              maximum_limit:
                summary: 8. El límite es mayor a 100
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite máximo de la consulta es 100.'
      '401':
        description: Errores de autenticación
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  description: Mensaje de error devuelto por la API.
            examples:
              token_expired:
                summary: 1. Token Expirado
                value:
                  success: false
                  message: 'El token ha expirado.'
              token_invalid:
                summary: 2. Token Inválido
                value:
                  success: false
                  message: 'Token inválido.'
              token_not_found:
                summary: 3. Token no encontrado
                value:
                  success: false
                  message: 'Token no proporcionado.'
              unauthenticated_user:
                summary: 4. Usuario no autenticado
                value:
                  success: false
                  message: 'Usuario no autenticado.'
      '403':
        description: Permisos insuficientes
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: No tienes los permisos necesarios.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
