/api/firmware/cards:
  post:
    summary: Crear Tarjeta
    description: |
      # 💳 Crear una nueva Tarjeta de Acceso
    tags:
      - Tarjetas de Acceso
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - codigo
            properties:
              codigo:
                type: string
                description: Código RFID único de la tarjeta.
                example: '0010725571'
    responses:
      '201':
        description: Recurso creado exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Tarjeta de Acceso agregada exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              estructura_invalida:
                summary: 1. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
              campos_incorrectos:
                summary: 2. Campos Incorrectos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'codigo'
                      message: "El campo 'codigo' es obligatorio y debe ser una cadena de texto."
              error_formato:
                summary: 3. Error en el formato
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'codigo'
                      message: 'El formato del código RFID no es válido.'
      '401':
        description: Errores de autenticación
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  description: Mensaje de error devuelto por la API.
            examples:
              token_expired:
                summary: 1. Token Expirado
                value:
                  success: false
                  message: 'El token ha expirado.'
              token_invalid:
                summary: 2. Token Inválido
                value:
                  success: false
                  message: 'Token inválido.'
              token_not_found:
                summary: 3. Token no encontrado
                value:
                  success: false
                  message: 'Token no proporcionado.'
              unauthenticated_user:
                summary: 4. Usuario no autenticado
                value:
                  success: false
                  message: 'Usuario no autenticado.'
      '403':
        description: Permisos insuficientes
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: No tienes los permisos necesarios.
      '409':
        description: El recurso ya existe en la base de datos.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Ya se encuentra registrada una Tarjeta de Acceso con ese código.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
