/api/firmware/logs:
  get:
    summary: Obtener Logs de Acceso
    description: |
      # 🔍 Obtener Logs de Acceso
    tags:
      - Logs
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: ubicacionId
        schema:
          type: string
        description: Filtra por el UUID de la ubicación.
        example: '35bae857-a4d0-4a41-affe-7bdaf883a665'
      - in: query
        name: puntoDeAccesoId
        schema:
          type: string
        description: Filtra por el UUID del Punto de Acceso.
        example: '173e25ec-1d70-4cc5-a875-cb6c7691e409'
      - in: query
        name: cedula
        schema:
          type: string
        description: Filtra por coincidencia parcial en la cedula del Usuario.
        example: '12345678'
      - in: query
        name: tarjeta
        schema:
          type: string
        description: Filtra por coincidencia parcial en la Tarjeta de Acceso.
        example: '0010725571'
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Número de página.
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Cantidad de registros por página.
    responses:
      '200':
        description: Logs obtenidos exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Logs obtenidos exitosamente.
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: 'cdd04615-c8a0-48ba-ae7a-05a06aac5881'
                      codigo_tarjeta_raw:
                        type: string
                        example: '10757162'
                      fecha:
                        type: string
                        example: '21/06/2026, 07:55:13 a. m.'
                      autorizado:
                        type: boolean
                        example: false
                      tarjeta:
                        type: object
                        nullable: true
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: '0dbf41aa-4a94-499b-a946-d3d4e2a814ca'
                          codigo:
                            type: string
                            example: '0010725571'
                          usuario:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                example: '044ba8ee-42fd-407a-a75e-986e512a2cf6'
                              nombre:
                                type: string
                                example: 'Iván'
                              apellido:
                                type: string
                                example: 'Gutiérrez'
                              cedula:
                                type: string
                                example: '12345678'
                              correo:
                                type: string
                                format: email
                                example: 'ivangutierrez@example.com'
                              foto:
                                type: string
                                example: 'fotos/1780935468495'
                      punto_acceso:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: '173e25ec-1d70-4cc5-a875-cb6c7691e409'
                          nombre:
                            type: string
                            example: 'LIDE'
                          mac:
                            type: string
                            example: '10:51:DB:82:5A:20'
                      ubicacion:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: '35bae857-a4d0-4a41-affe-7bdaf883a665'
                          mesh_id:
                            type: string
                            example: '77:77:77:77:77:77'
                          nombre:
                            type: string
                            example: 'EIEE - Piso 3'
                metadata:
                  type: object
                  properties:
                    totalItems:
                      type: integer
                      example: 15
                    page:
                      type: integer
                      example: 1
                    limit:
                      type: integer
                      example: 10
                    totalPages:
                      type: integer
                      example: 2
      '400':
        description: Error de validación en los parámetros de consulta (Query Params).
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message:
                  {
                    type: string,
                    example: 'Error de validación en los datos enviados.',
                  }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              uuid_invalido:
                summary: 1. UUID Inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'ubicacionId'
                      message: "El parametro 'ubicacionId' no es un UUID válido."
                    - field: 'puntoDeAccesoId'
                      message: "El parametro 'puntoDeAccesoId' no es un UUID válido."
              the_page_is_not_a_number:
                summary: 1. La página no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número.'
              the_page_is_not_an_integer:
                summary: 2. La página no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número entero.'
              minimum_page:
                summary: 3. El numero de página es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página mínima de la consulta es 1.'
              limit_is_not_a_number:
                summary: 4. El límite no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número.'
              limit_is_not_an_integer:
                summary: 5. El límite no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número entero.'
              minimum_limit:
                summary: 6. El límite es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite mínimo de la consulta es 1.'
              maximum_limit:
                summary: 7. El límite es mayor a 100
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite máximo de la consulta es 100.'
      '401':
        description: Errores de autenticación.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  description: Mensaje de error devuelto por la API.
            examples:
              token_expired:
                summary: 1. Token Expirado
                value:
                  success: false
                  message: 'El token ha expirado.'
              token_invalid:
                summary: 2. Token Inválido
                value:
                  success: false
                  message: 'Token inválido.'
              token_not_found:
                summary: 3. Token no encontrado
                value:
                  success: false
                  message: 'Token no proporcionado.'
              unauthenticated_user:
                summary: 4. Usuario no autenticado
                value:
                  success: false
                  message: 'Usuario no autenticado.'
      '403':
        description: Permisos insuficientes.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: No tienes los permisos necesarios.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
