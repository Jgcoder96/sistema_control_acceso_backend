/api/users:
  get:
    summary: Obtener Usuarios
    description: |
      # 🔍 Obtener lista de Usuarios
    tags:
      - Usuarios
    parameters:
      - in: query
        name: status
        schema:
          type: string
          enum: [active, deleted, all]
          default: all
        description: Filtra los usuarios por su estado de eliminación.
      - in: query
        name: search
        schema:
          type: string
        description: Filtra por coincidencia parcial en la cedula del usuario.
        example: '123456789'
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Número de página para la paginación.
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Cantidad de registros por página.
    responses:
      '200':
        description: Lista de usuarios obtenida exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Usuarios obtenidos exitosamente.
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: 'cf22220f-fb1f-4176-a44b-3d815ed15c92'
                      nombre:
                        type: string
                        example: 'Lizbeth'
                      apellido:
                        type: string
                        example: 'Romero'
                      cedula:
                        type: string
                        example: '10262082'
                      correo_electronico:
                        type: string
                        format: email
                        example: 'lizbethromero@gmail.com'
                      foto_url:
                        type: string
                        format: uri
                        example: 'https://teg-s3-bucket.s3.us-east-2.amazonaws.com/fotos/1779135007850...'
                      estado:
                        type: string
                        example: 'activo'
                      creado_el:
                        type: string
                        format: date-time
                        example: '2026-05-18T20:07:36.654Z'
                      actualizado_el:
                        type: string
                        format: date-time
                        example: '2026-05-18T20:10:09.036Z'
                      eliminado_el:
                        type: string
                        format: date-time
                        nullable: true
                        example: null
                metadata:
                  type: object
                  properties:
                    totalItems:
                      type: integer
                      example: 3
                    page:
                      type: integer
                      example: 1
                    limit:
                      type: integer
                      example: 10
                    totalPages:
                      type: integer
                      example: 1
      '400':
        description: Error de validación en los parámetros de consulta (Query Params).
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message:
                  {
                    type: string,
                    example: 'Error de validación en los datos enviados.',
                  }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              invalid_status:
                summary: 1. Error en el estado
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'status'
                      message: "El estado de la consulta debe ser 'active', 'deleted' o 'all'."
              the_page_is_not_a_number:
                summary: 2. La página no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número.'
              the_page_is_not_an_integer:
                summary: 3. La página no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número entero.'
              minimum_page:
                summary: 4. El numero de página es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página mínima de la consulta es 1.'
              limit_is_not_a_number:
                summary: 5. El límite no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número.'
              limit_is_not_an_integer:
                summary: 6. El límite no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número entero.'
              minimum_limit:
                summary: 7. El límite es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite mínimo de la consulta es 1.'
              maximum_limit:
                summary: 8. El límite es mayor a 100
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite máximo de la consulta es 100.'
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
