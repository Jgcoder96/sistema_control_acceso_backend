/api/locations:
  post:
    summary: Crear Ubicación
    description: |
      # 📍 Crear una nueva Ubicación física
    tags:
      - Ubicaciones
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                description: Nombre único de la ubicación física.
                example: 'Planta Baja'
    responses:
      '201':
        description: Recurso creado exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Ubicación creada exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              campo_obligatorio:
                summary: 1. Inconsistencia en los campos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' es obligatorio y debe ser una cadena de texto."
              error_longitud:
                summary: 2. Error de longitud
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' debe contener al menos 4 caracteres."
                    - field: 'nombre'
                      message: "El campo 'nombre' no puede exceder los 100 caracteres."
              estructura_invalida:
                summary: 3. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
      '409':
        description: El recurso ya existe en la base de datos.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Ya se encuentra registrado una ubicación con ese nombre.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
