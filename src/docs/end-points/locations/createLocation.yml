/api/firmware/locations:
  post:
    summary: Crear Ubicación
    description: |
      # 📍 Crear una nueva Ubicación física
    tags:
      - Ubicaciones
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
              - mesh_id
            properties:
              nombre:
                type: string
                description: Nombre único de la ubicación física.
                example: 'Cuarto de Servidores'
              mesh_id:
                type: string
                description: ID único de la malla a la que pertenece la ubicación.
                example: '77:77:77:77:77:77'
    responses:
      '201':
        description: Recurso creado exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Ubicación creada exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              estructura_invalida:
                summary: 1. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
              campos_invalidos:
                summary: 2. Campos Inválidos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' es obligatorio y debe ser una cadena de texto."
                    - field: 'mesh_id'
                      message: "El campo 'mesh_id' es obligatorio y debe ser una cadena de texto."
              error_formato_mesh_id:
                summary: 3. Formato de mesh_id inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'mesh_id'
                      message: "El 'mesh_id' debe ser un formato hexadecimal válido (ej: 77:77:77:77:77:77)."
              error_longitud:
                summary: 4. Error de longitud
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' debe contener al menos 4 caracteres."
                    - field: 'nombre'
                      message: "El campo 'nombre' no puede exceder los 100 caracteres."
      '409':
        description: El recurso ya existe en la base de datos.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Ya se encuentra registrado una ubicación con ese nombre o el mismo ID de malla.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
