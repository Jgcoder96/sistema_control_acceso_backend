/api/firmware/access-points:
  get:
    summary: Obtener Puntos de Acceso
    description: |
      # 🔍 Obtener lista de Puntos de Acceso
    tags:
      - Puntos de Acceso
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: status
        schema:
          type: string
          enum: [active, deleted, all]
          default: all
        description: Filtra los puntos de acceso por su estado de eliminación.
      - in: query
        name: location
        schema:
          type: string
        description: Filtra por el UUID de la ubicación.
      - in: query
        name: search
        schema:
          type: string
        description: Filtra por coincidencia parcial en el nombre del punto de acceso.
        example: 'LIDE'
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Número de página.
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Cantidad de registros por página.
    responses:
      '200':
        description: Puntos de Acceso obtenidos exitosamente
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 'Puntos de Acceso obtenidos exitosamente.'
                data:
                  type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: '2c0766f2-5b93-4041-af31-dd9820f46e9d'
                          nombre:
                            type: string
                            example: 'LIDE'
                          mac:
                            type: string
                            example: '50:78:7D:16:3C:1E'
                          creado_el:
                            type: string
                            format: date-time
                            example: '08/06/2026, 12:13:10 p. m.'
                          actualizado_el:
                            type: string
                            format: date-time
                            example: '10/06/2026, 08:16:50 p. m.'
                          eliminado_el:
                            type: string
                            format: date-time
                            nullable: true
                            example: null
                          ubicacion:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                example: 'fc9835ed-0938-4d07-a55b-1aed1c83998b'
                              nombre:
                                type: string
                                example: 'EIEE - Piso 3'
                    metadata:
                      type: object
                      properties:
                        totalItems:
                          type: integer
                          example: 3
                        page:
                          type: integer
                          example: 1
                        limit:
                          type: integer
                          example: 10
                        totalPages:
                          type: integer
                          example: 1
      '400':
        description: Error de validación en los parámetros de consulta (Query Params)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message:
                  {
                    type: string,
                    example: 'Error de validación en los datos enviados.',
                  }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              invalid_status:
                summary: 1. Error en el estado
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'status'
                      message: "El estado de la consulta debe ser 'active', 'deleted' o 'all'."
              invalid_location:
                summary: 2. Error en ID de la ubicación
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'location'
                      message: 'La ubicación de la consulta debe ser un UUID válido.'
              the_page_is_not_a_number:
                summary: 3. La página no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número.'
              the_page_is_not_an_integer:
                summary: 4. La página no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página de la consulta debe ser un número entero.'
              minimum_page:
                summary: 5. El numero de página es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'page'
                      message: 'La página mínima de la consulta es 1.'
              limit_is_not_a_number:
                summary: 6. El límite no es un número
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número.'
              limit_is_not_an_integer:
                summary: 7. El límite no es un número entero
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite de la consulta debe ser un número entero.'
              minimum_limit:
                summary: 8. El límite es menor a 1
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite mínimo de la consulta es 1.'
              maximum_limit:
                summary: 9. El límite es mayor a 100
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'limit'
                      message: 'El límite máximo de la consulta es 100.'
      '401':
        description: Errores de autenticación
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  description: Mensaje de error devuelto por la API.
            examples:
              token_expired:
                summary: 1. Token Expirado
                value:
                  success: false
                  message: 'El token ha expirado.'
              token_invalid:
                summary: 2. Token Inválido
                value:
                  success: false
                  message: 'Token inválido.'
              token_not_found:
                summary: 3. Token no encontrado
                value:
                  success: false
                  message: 'Token no proporcionado.'
              unauthenticated_user:
                summary: 4. Usuario no autenticado
                value:
                  success: false
                  message: 'Usuario no autenticado.'
      '403':
        description: Permisos insuficientes
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: No tienes los permisos necesarios.
      '500':
        description: Error interno del servidor
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
