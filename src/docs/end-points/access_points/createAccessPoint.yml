/api/firmware/access-points:
  post:
    summary: Crear Punto de Acceso
    description: |
      # 📶 Crear un nuevo Punto de Acceso
    tags:
      - Puntos de Acceso
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
              - mac
              - ubicacion_id
            properties:
              nombre:
                type: string
                description: Nombre único descriptivo del punto de acceso.
                example: 'Puerta Principal'
              mac:
                type: string
                description: Dirección MAC del punto de acceso.
                example: '50:78:7D:16:3C:1E'
              ubicacion_id:
                type: string
                description: Identificador único de la ubicación relacionada.
                example: 'fc9835ed-0938-4d07-a55b-1aed1c83998b'
    responses:
      '201':
        description: Recurso creado exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Punto de acceso creado exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              estructura_invalida:
                summary: 1. Cuerpo JSON inválido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
              campos_invalidos:
                summary: 2. Campos Inválidos
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' es obligatorio y debe ser una cadena de texto."
                    - field: 'mac'
                      message: "El campo 'mac' es obligatorio y debe ser una cadena de texto."
                    - field: 'ubicacion_id'
                      message: "El campo 'ubicacion_id' es obligatorio y debe ser una cadena de texto."
              error_longitud:
                summary: 3. Error de longitud
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' debe contener al menos 4 caracteres."
                    - field: 'nombre'
                      message: "El campo 'nombre' no puede exceder los 100 caracteres."
              mac_invalida:
                summary: 4. Dirección MAC no válida
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'mac'
                      message: 'La dirección MAC no es válida.'
              uuid_invalido:
                summary: 5. ID de ubicación no es UUID válido
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'ubicacion_id'
                      message: 'El formato del ID de la ubicación no es un UUID válido.'

      '404':
        description: Recurso no encontrado.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: La ubicación física no se encuentra registrada.
      '409':
        description: El recurso ya existe en la base de datos.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
            examples:
              MacEnUso:
                summary: 1. Dirección MAC ya existe
                value:
                  success: false
                  message: 'Ya se encuentra registrado un Punto de Acceso con esa dirección MAC.'
              NombreEnUso:
                summary: 2. Punto de Acceso ya existe
                value:
                  success: false
                  message: 'Ya se encuentra registrado un Punto de Acceso con ese nombre.'
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
