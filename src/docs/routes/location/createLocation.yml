/api/location:
  post:
    summary: Registro de nueva ubicación física.
    description: Permite dar de alta una nueva ubicación física en el sistema de control de acceso. Este proceso garantiza la integridad de los datos mediante la validación de formato y la verificación de unicidad, impidiendo el registro de nombres duplicados.
    tags:
      - Ubicaciones
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                description: Nombre único de la ubicación física.
                example: 'Planta Baja'
    responses:
      '201':
        description: Ubicación creada exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Ubicación creada exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              campo_obligatorio:
                summary: 1. Campo faltante
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' es obligatorio."
              longitud_minima:
                summary: 2. Nombre demasiado corto
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: 'El nombre debe contener al menos 4 caracteres.'
              longitud_maxima:
                summary: 3. Nombre demasiado largo
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: 'El nombre no puede exceder los 100 caracteres.'
              estructura_invalida:
                summary: 4. Estructura de JSON inválida
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'body'
                      message: 'La estructura de la solicitud es inválida. Se requiere un objeto JSON.'
      '409':
        description: Ya existe una ubicación con el mismo nombre.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Ya existe una ubicación con el mismo nombre.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
