/api/locations:
  post:
    summary: Registro de nueva ubicación.
    description: |
      # 📍 Registro de Ubicación física

      Este endpoint permite dar de alta un nuevo nodo geográfico dentro de la infraestructura del sistema. Es el paso inicial necesario para establecer la jerarquía donde se vincularán los dispositivos más adelante.

      **Lo que garantiza este proceso:**

      * 🆔 **Unicidad de Registro:** Implementa una validación de duplicidad sobre el nombre para asegurar que cada ubicación sea única y evitar colisiones en el inventario.
      * 📏 **Validación de Esquema:** Aplica un control riguroso sobre el tipo de dato y la longitud del texto, garantizando que la información cumpla con los estándares del sistema.
      * 🛠  **Integridad de Datos:** Verifica la presencia de campos obligatorios y la estructura del JSON antes de proceder con la persistencia en la base de datos.

      > **Nota de Implementación:** Se recomienda utilizar nombres descriptivos y normalizados (ej. "Planta Alta - Ala Norte") para facilitar la gestión administrativa y la claridad en los reportes.
    tags:
      - Ubicaciones
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                description: Nombre único de la ubicación física.
                example: 'Planta Baja'
    responses:
      '201':
        description: Ubicación creada exitosamente.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Ubicación creada exitosamente.
      '400':
        description: Error de validación en los datos enviados.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string }
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      field: { type: string }
                      message: { type: string }
            examples:
              campo_obligatorio:
                summary: 1. Campo faltante
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: "El campo 'nombre' es obligatorio."
              longitud_minima:
                summary: 2. Nombre demasiado corto
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: 'El nombre debe contener al menos 4 caracteres.'
              longitud_maxima:
                summary: 3. Nombre demasiado largo
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - field: 'nombre'
                      message: 'El nombre no puede exceder los 100 caracteres.'
              estructura_invalida:
                summary: 4. Estructura de JSON inválida
                value:
                  success: false
                  message: 'Error de validación en los datos enviados.'
                  issues:
                    - message: 'La estructura del cuerpo de la solicitud no es válida. Se requiere un objeto JSON.'
      '409':
        description: Ya existe una ubicación con el mismo nombre.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Este nombre ya está asignado a otra ubicación física.
      '500':
        description: Error interno del servidor.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Error interno del servidor.
